# Named location for rate-limit 429 responses.
# Named locations don't inherit server-level add_header, so all headers are re-declared here.
location @rate_limit_response {
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
    add_header Content-Type "application/json; charset=utf-8" always;
    return 429 '{"status":false,"message":"Too many requests. Please try again later."}';
}
