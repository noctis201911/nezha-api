# ── Next.js 静态资源 / 图片优化器 缓存修复 ───────────────────────────────
# 背景: 同级 catch-all 代理块 (proxy/nezha.am/*.conf 内 location ^~ /) 对所有
#   非 .png/.jpg/.css/.js/.woff 结尾的响应强加 "Cache-Control: no-cache"。
#   Next 图片优化器 URL 形如 /_next/image?url=...&w=48&q=75 (无文件扩展名),
#   因此被打上 no-cache → Cloudflare 显示 DYNAMIC, 浏览器也不缓存,
#   每次导航 / 每个用户都回源 Node 重新优化图片 → 订单页等页面"图片加载慢"。
# 修复: 用更长前缀 location (^~ /_next/... 优先级高于 ^~ /) 单独接管
#   /_next/static 与 /_next/image, 给予可缓存头。
#   HTML 页面不受影响, 仍由 catch-all 保持 no-cache —— 确保 SSR 页面不被
#   边缘缓存, 避免历史上的 nginx 404 缓存陷阱重现。
# 可回滚: 删除本文件 + nginx reload 即恢复原状。

location ^~ /_next/static/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    # 内容哈希命名, 不可变, 可永久缓存; 每次部署生成新文件名故无陈旧风险
    proxy_hide_header Cache-Control;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
}

location ^~ /_next/image {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    # 优化后图片可被浏览器 / Cloudflare 缓存; 1 天 TTL (logo 极少变, 短暂陈旧可接受)
    proxy_hide_header Cache-Control;
    add_header Cache-Control "public, max-age=86400" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
}
